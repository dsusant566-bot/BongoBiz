<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Classified Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="manifest" href="manifest.json" >
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        header { background: #fff; padding: 10px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); gap: 10px; }
        .logo-img { height: 45px; width: auto; cursor: pointer; }
        .search-container { flex-grow: 1; max-width: 500px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        #userProfile { display: none; align-items: center; gap: 10px; font-size: 12px; }
        #userImg { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .hero { background: linear-gradient(rgba(0,47,52,0.7), rgba(0,47,52,0.7)), url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070'); background-size: cover; padding: 30px 20px; text-align: center; color: white; }
        .categories { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; cursor: pointer; min-width: 75px; font-size: 11px; font-weight: bold; color: inherit; }
        .cat-icon { font-size: 24px; background: #f0f7ff; padding: 10px; border-radius: 50%; margin-bottom: 5px; display: inline-block; }
        .poster-box { position: relative; color: white; border-radius: 12px; padding: 40px 20px; text-align: center; margin-bottom: 25px; overflow: hidden; background-size: cover; background-position: center; }
        .poster-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .poster-content { position: relative; z-index: 2; }
        .loan-poster { background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071'); }
        .web-poster { background-image: url('https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=2070'); }
        .btn-action { padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; border: none; cursor: pointer; background: var(--secondary); color: var(--primary); }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; padding: 0 15px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .ad-card img { width: 100%; height: 150px; object-fit: cover; }
        #uploadModal, #detailModal, #loanModal, #myAdsModal, #customLoginModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; text-align: center; }
        .close-x { position: absolute; top: 5px; right: 15px; font-size: 45px; color: red; cursor: pointer; font-weight: bold; z-index: 10001; }
        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid white; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        /* Category Window Style */
        #categoryPage { display: none; padding-top: 10px; min-height: 80vh; }
        .back-nav { padding: 15px 20px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <img src="icon.png" alt="BongoBiz" class="logo-img" onclick="location.reload()">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Products...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <select id="langSwitcher" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिन्दी</option>
            </select>
            <div id="loginSection">
                <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
            </div>
            <div id="userProfile">
                <img id="userImg" src="">
                <button onclick="showMyAds()" id="myAdsBtn" style="background:none; border:none; color:blue; cursor:pointer; font-weight:900;">MY ADS</button>
                <button class="logout-btn" onclick="logout()">LOGOUT</button>
            </div>
        </div>
    </header>

    <div id="homePage">
        <div class="hero">
            <h1 id="hTitle">India's Own Classified Marketplace</h1>
            <p id="hSub">Buy, Sell & Apply for Loans</p>
        </div>

        <div class="categories">
            <div class="cat-card" onclick="openCategory('Resale')"><div class="cat-icon">🛍️</div><div id="c1">Resale</div></div>
            <div class="cat-card" onclick="openCategory('Wholesale')"><div class="cat-icon">📦</div><div id="c2">Wholesale</div></div>
            <div class="cat-card" onclick="openCategory('Property')"><div class="cat-icon">🏠</div><div id="c3">Property</div></div>
        </div>

        <div class="content">
            <div class="poster-box loan-poster">
                <div class="poster-content">
                    <h3 id="lTitle">Need Financial Assistance?</h3>
                    <button onclick="openModal('loanModal')" class="btn-action">APPLY FOR LOAN</button>
                </div>
            </div>
            <div class="poster-box web-poster">
                <div class="poster-content">
                    <h3 id="wTitle">Professional Website?</h3>
                    <a href="https://wa.me/917585999923" target="_blank" class="btn-action" style="background:var(--wa-green); color:white;">WhatsApp Us</a>
                </div>
            </div>
            <h3 id="viewTitle" style="padding-left:20px;">Fresh Recommendations</h3>
            <div class="ads-grid" id="adsGrid">Loading data...</div>
        </div>
    </div>

    <div id="categoryPage">
        <div class="back-nav">
            <button class="back-btn" id="backBtn">← Back</button>
            <h2 id="catHeader" style="margin:0;">Category</h2>
        </div>
        <div class="ads-grid" id="catAdsGrid"></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('detailModal')">&times;</span>
            <img id="detImg" style="width:100%; height:220px; object-fit:cover; border-radius:8px;">
            <h2 id="detPrice" style="color:var(--primary); margin:15px 0; text-align:left;"></h2>
            <h3 id="detTitle" style="text-align:left;"></h3>
            <p id="detDesc" style="text-align:left; color:#555;"></p>
            <hr>
            <button id="callBtn" style="background:var(--secondary); color:black; width:100%; padding:15px; border:none; border-radius:50px; font-weight:bold; margin-bottom:10px; cursor:pointer;">📞 Call</button>
            <button id="waBtn" style="background:var(--wa-green); color:white; width:100%; padding:15px; border:none; border-radius:50px; font-weight:bold; cursor:pointer;">💬 WhatsApp</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('uploadModal')">&times;</span>
            <h3 id="postTitle">Post Your Ad</h3>
            <input type="hidden" id="editOldName">
            <select id="itemCat"><option value="Resale">Resale</option><option value="Wholesale">Wholesale</option><option value="Property">Property</option></select>
            <input type="text" id="itemName" placeholder="Product Name"><input type="number" id="itemPrice" placeholder="Price"><input type="tel" id="itemPhone" placeholder="Phone"><textarea id="itemDesc" placeholder="Details"></textarea>
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="processUpload()" id="uploadBtn" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Submit</button>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn" style="background:var(--wa-green);">WhatsApp Us</a>
        <button onclick="checkLoginAndOpen('uploadModal')" class="f-btn" id="sellBtnStatic" style="background:#ffce32; border:none; color:#002f34; cursor:pointer;">➕ Sell Now</button>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlFKFlfRkc0igAePdbXobZBsPgKM9SeDRTmSA2T7bRnohYQGtiqLHOqoG2Q5YwtXfJ/exec?key=BongoBiz_Secure_2024";
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        let allAds = []; let userEmail = "";

        // --- Core Functions ---
        async function fetchAds() { 
            const res = await fetch(APPS_SCRIPT_URL); allAds = await res.json(); renderAds(allAds, 'adsGrid'); 
        }

        function renderAds(data, gridId) {
            const grid = document.getElementById(gridId); grid.innerHTML = "";
            data.filter(ad => ad.Status !== 'Deleted').reverse().forEach(ad => {
                grid.innerHTML += `<div class="ad-card" onclick="showDetails('${ad.Name}')"><img src="${ad.Image}"><div style="padding:10px;"><b>Rs ${ad.Price}</b><br>${ad.Name}</div></div>`;
            });
        }

        function openCategory(cat) {
            document.getElementById('homePage').style.display='none'; 
            document.getElementById('categoryPage').style.display='block';
            document.getElementById('catHeader').innerText = cat;
            const filtered = allAds.filter(ad => ad.Category.toLowerCase().trim().includes(cat.toLowerCase()) && ad.Status !== 'Deleted');
            renderAds(filtered, 'catAdsGrid'); window.scrollTo(0,0);
        }

        function closeCategory() { 
            document.getElementById('homePage').style.display='block'; 
            document.getElementById('categoryPage').style.display='none'; 
        }

        document.getElementById('backBtn').onclick = closeCategory;

        // --- Auth Functions ---
        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('bongoUser', JSON.stringify({name: payload.name, email: payload.email.toLowerCase(), picture: payload.picture}));
            fetch(APPS_SCRIPT_URL, {method: 'POST', mode: 'no-cors', body: JSON.stringify({action: 'login', name: payload.name, email: payload.email.toLowerCase()})}).then(() => location.reload());
        }

        function checkAutoLogin() {
            const saved = localStorage.getItem('bongoUser');
            if(saved) {
                const user = JSON.parse(saved); userEmail = user.email;
                document.getElementById("loginSection").style.display = "none";
                document.getElementById('userProfile').style.display = "flex";
                document.getElementById('userImg').src = user.picture;
            }
        }

        // --- Language Logic ---
        const translations = {
            en: { hTitle: "India's Own Classified Marketplace", hSub: "Buy, Sell & Apply for Loans", viewTitle: "Fresh Recommendations", sellBtn: "➕ Sell Now", c1: "Resale", c2: "Wholesale", c3: "Property", back: "← Back" },
            bn: { hTitle: "ভারতের নিজস্ব মার্কেটপ্লেস", hSub: "কেনা-বেচা এবং লোনের আবেদন করুন", viewTitle: "নতুন বিজ্ঞাপন", sellBtn: "➕ বিক্রি করুন", c1: "রিসেল", c2: "হোলসেল", c3: "প্রপার্টি", back: "← ফিরে যান" },
            hi: { hTitle: "भारत का अपना मार्केटप्लेस", hSub: "खरीदें, बेचें और ऋण आवेदन करें", viewTitle: "नई सिफारिशें", sellBtn: "➕ अभी बेचें", c1: "रीसेल", c2: "थोक", c3: "संपत्ति", back: "← वापस" }
        };

        function changeLanguage(val) {
            const l = translations[val];
            document.getElementById("hTitle").innerText = l.hTitle;
            document.getElementById("hSub").innerText = l.hSub;
            document.getElementById("viewTitle").innerText = l.viewTitle;
            document.getElementById("c1").innerText = l.c1;
            document.getElementById("c2").innerText = l.c2;
            document.getElementById("c3").innerText = l.c3;
            document.getElementById("backBtn").innerText = l.back;
            document.getElementById("sellBtnStatic").innerText = l.sellBtn;
            localStorage.setItem('selectedLang', val);
        }

        function applySavedLanguage() {
            const savedLang = localStorage.getItem('selectedLang') || 'en';
            document.getElementById('langSwitcher').value = savedLang;
            changeLanguage(savedLang);
        }

        // --- Helper Functions ---
        function logout() { localStorage.removeItem('bongoUser'); location.reload(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function checkLoginAndOpen(id) { userEmail ? openModal(id) : alert("Please Login First"); }

        window.onload = () => { 
            checkAutoLogin(); 
            fetchAds(); 
            applySavedLanguage(); 
        };
    </script>
</body>
</html>

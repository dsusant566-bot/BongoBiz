<script>
       const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlFKFlfRkc0igAePdbXobZBsPgKM9SeDRTmSA2T7bRnohYQGtiqLHOqoG2Q5YwtXfJ/exec?key=BongoBiz_Secure_2024";
const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
let allAds = []; let userEmail = "";
        function checkAutoLogin() {
            const saved = localStorage.getItem('bongoUser');
            if(saved) {
                const user = JSON.parse(saved); userEmail = user.email;
                document.getElementById("loginSection").style.display = "none";
                document.getElementById('userProfile').style.display = "flex";
                document.getElementById('userImg').src = user.picture;
            }
        }
        function logout() { localStorage.removeItem('bongoUser'); location.reload(); }

        async function fetchAds() { 
            const res = await fetch(APPS_SCRIPT_URL); allAds = await res.json(); renderAds(allAds); 
        }

        function renderAds(data) {
            const grid = document.getElementById('adsGrid'); grid.innerHTML = "";
            data.filter(ad => ad.Status !== 'Deleted').reverse().forEach(ad => {
                grid.innerHTML += `<div class="ad-card" onclick="showDetails('${ad.Name}')"><img src="${ad.Image}"><div style="padding:10px;"><b>Rs ${ad.Price}</b><br>${ad.Name}</div></div>`;
            });
        }

        function showDetails(name) {
            const ad = allAds.find(a => a.Name === name);
            if(!ad) return;
            document.getElementById('detImg').src = ad.Image;
            document.getElementById('detPrice').innerText = "Rs " + ad.Price;
            document.getElementById('detTitle').innerText = ad.Name;
            document.getElementById('detDesc').innerText = ad.Description;
            document.getElementById('detAddr').innerText = "📍 " + (ad.Address || "Kolkata");
            
            document.getElementById('callBtn').onclick = () => userEmail ? window.location.href="tel:"+ad.Phone : openModal('customLoginModal');
            document.getElementById('waBtn').onclick = () => userEmail ? window.open("https://wa.me/91"+ad.Phone) : openModal('customLoginModal');
            
            openModal('detailModal');
        }

        function showMyAds() {
            const container = document.getElementById('myAdsContainer'); container.innerHTML = "";
            allAds.filter(ad => ad.Email === userEmail && ad.Status !== 'Deleted').forEach(ad => {
                container.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px; text-align:left;"><b>${ad.Name}</b> (Rs ${ad.Price}) <br><button class="edit-btn" onclick="openEditForm('${ad.Name}')">Edit</button><button class="del-btn" onclick="deleteAd('${ad.Name}')">Delete</button></div>`;
            });
            openModal('myAdsModal');
        }

        function openEditForm(name) {
            const ad = allAds.find(a => a.Name === name);
            document.getElementById('editOldName').value = ad.Name;
            document.getElementById('itemName').value = ad.Name;
            document.getElementById('itemPrice').value = ad.Price;
            document.getElementById('itemPhone').value = ad.Phone;
            document.getElementById('itemAddress').value = ad.Address;
            document.getElementById('itemDesc').value = ad.Description;
            document.getElementById('itemCat').value = ad.Category;
            document.getElementById('imgSection').style.display = "none";
            document.getElementById('postTitle').innerText = "Edit Your Ad";
            closeModal('myAdsModal'); openModal('uploadModal');
        }

       async function processUpload() {
    const oldName = document.getElementById('editOldName').value;
    const uploadBtn = document.getElementById('uploadBtn');
    uploadBtn.disabled = true;
    uploadBtn.innerText = "Processing...";

    let imgUrl = "";
    if(!oldName) {
        const file = document.getElementById('fileInput').files[0];
        if(file) {
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const imgData = await res.json(); imgUrl = imgData.data.url;
        }
    }

    const payload = {
        action: oldName ? 'editAd' : 'uploadAd', email: userEmail, Email: userEmail,
        oldName: oldName, newName: document.getElementById('itemName').value,
        newPrice: document.getElementById('itemPrice').value, newPhone: document.getElementById('itemPhone').value,
        newAddress: document.getElementById('itemAddress').value, newDesc: document.getElementById('itemDesc').value,
        Name: document.getElementById('itemName').value, Price: document.getElementById('itemPrice').value,
        Phone: document.getElementById('itemPhone').value, Address: document.getElementById('itemAddress').value,
        Description: document.getElementById('itemDesc').value, Category: document.getElementById('itemCat').value, Image: imgUrl
    };

    fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
    .then(() => {
        alert(oldName ? "আপনার বিজ্ঞাপনটি সফলভাবে আপডেট হয়েছে!" : "আপনার বিজ্ঞাপনটি সফলভাবে পাবলিশ হয়েছে!");
        location.reload();
    });
}

async function submitLoan() {
    const data = { 
        action: 'loan', name: document.getElementById('loanName').value, 
        phone: document.getElementById('loanPhone').value, email: document.getElementById('loanEmail').value, 
        address: document.getElementById('loanAddr').value, occupation: document.getElementById('loanOccu').value, 
        loan_type: document.getElementById('loanType').value, loan_amount: document.getElementById('loanAmount').value 
    };
    fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
    .then(() => {
        alert("লোন আবেদন সফল হয়েছে!");
        location.reload();
    });
}

        async function deleteAd(name) {
            if(confirm("Delete?")) {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteAd', email: userEmail, name: name }) });
                location.reload();
            }
        }

        function handleCredentialResponse(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    console.log("User Logged In:", payload.name);

    // ইউজারকে ব্রাউজারে সেভ করা
    localStorage.setItem('bongoUser', JSON.stringify({
        name: payload.name,
        email: payload.email.toLowerCase(),
        picture: payload.picture
    }));

    // গুগল শিটে ডাটা পাঠানো (লগইন ট্র্যাকিং)
    fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
            action: "login",
            name: payload.name,
            email: payload.email.toLowerCase()
        })
    })
    .then(() => {
        console.log("Login synced with Sheets");
        location.reload(); 
    })
    .catch(err => {
        console.error("Sync Error:", err);
        location.reload();
    });
}

function changeLanguage(val) {
    const l = translations[val];
    const ids = ['hTitle', 'hSub', 'viewTitle', 'sellBtnStatic', 'myAdsBtn', 'c1', 'c2', 'c3', 'lTitle', 'lDesc', 'lBtn', 'wTitle', 'wDesc', 'waFloat'];
    ids.forEach(id => {
        const element = document.getElementById(id);
        if (element) { element.innerText = l[id]; }
    });
    const wBtn = document.getElementById('wBtn');
    if(wBtn) {
        if(val === 'bn') wBtn.innerText = "হোয়াটস্যাপ করুন";
        else if(val === 'hi') wBtn.innerText = "व्हाट्सएप करें";
        else wBtn.innerText = "WhatsApp Us";
    }
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; if(id === 'uploadModal') location.reload(); }
function checkLoginAndOpen(id) { userEmail ? openModal(id) : openModal('customLoginModal'); }

document.getElementById('langSwitcher').onchange = (e) => changeLanguage(e.target.value);

window.onload = () => { checkAutoLogin(); fetchAds(); };
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Classified Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        header { background: #fff; padding: 10px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); gap: 10px; }
        .logo-img { height: 45px; width: auto; }
        .search-container { flex-grow: 1; max-width: 500px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .login-btn-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 2.5px solid #002f34; padding: 4px 12px; border-radius: 25px; cursor: pointer; }
        #userProfile { display: none; align-items: center; gap: 8px; }
        #userImg { width: 32px; height: 32px; border-radius: 50%; }
        .hero { background: linear-gradient(rgba(0,47,52,0.7), rgba(0,47,52,0.7)), url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070'); background-size: cover; padding: 30px 20px; text-align: center; color: white; }
        .categories { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; cursor: pointer; min-width: 80px; font-size: 12px; font-weight: bold; }
        .cat-icon { font-size: 24px; background: #f0f7ff; padding: 10px; border-radius: 50%; margin-bottom: 5px; display: inline-block; }
        .content { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .poster-box { position: relative; color: white; border-radius: 12px; padding: 40px 20px; text-align: center; margin-bottom: 25px; background-size: cover; background-position: center; overflow: hidden; }
        .poster-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .poster-content { position: relative; z-index: 2; }
        .loan-poster { background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071'); }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .ad-card img { width: 100%; height: 150px; object-fit: cover; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .f-btn { padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Mobiles, Laptops...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <div id="loginSection">
                <div class="login-btn-box">
                    <span class="login-text-bold">LOGIN</span>
                    <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                </div>
            </div>
            <div id="userProfile">
                <img id="userImg" src="">
                <button onclick="showMyAds()" id="myAdsBtn" style="background:none; border:none; color:blue; cursor:pointer; font-weight:bold;">My Ads</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1 style="font-size: 40px; color: var(--secondary); margin: 0;">BongoBiz</h1>
        <p>India's Own Classified Marketplace</p>
    </div>

    <div class="categories">
        <div class="cat-card" onclick="filterCat('Resale')"><div class="cat-icon">🛍️</div><div>Resale</div></div>
        <div class="cat-card" onclick="filterCat('Wholesale')"><div class="cat-icon">📦</div><div>Wholesale</div></div>
        <div class="cat-card" onclick="filterCat('Property')"><div class="cat-icon">🏠</div><div>Property</div></div>
    </div>

    <div class="content">
        <div class="poster-box loan-poster">
            <div class="poster-content">
                <h3>Need Financial Assistance?</h3>
                <p>Apply for Personal or Business loans easily.</p>
                <button onclick="openModal('loanModal')" class="btn-yellow" style="padding: 12px 30px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer;">APPLY FOR LOAN</button>
            </div>
        </div>

        <h3 id="viewTitle">Fresh Recommendations</h3>
        <div class="ads-grid" id="adsGrid">Loading...</div>
    </div>

    <div id="loanModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:10px; right:20px; font-size:30px; color:red; cursor:pointer;" onclick="closeModal('loanModal')">&times;</span>
            <h3 style="margin-bottom: 20px;">Loan Application</h3>
            <input type="text" id="lName" placeholder="Full Name *" required>
            <input type="tel" id="lPhone" placeholder="Phone Number *" required>
            <input type="email" id="lEmail" placeholder="Email ID (Optional)">
            <input type="text" id="lAddr" placeholder="Address">
            <input type="text" id="lOccu" placeholder="Occupation">
            <select id="lEmp">
                <option value="">Business / Salaried</option>
                <option value="Business">Business</option>
                <option value="Salaried">Salaried</option>
            </select>
            <input type="number" id="lInc" placeholder="Monthly Income">
            <select id="lType">
                <option value="Personal">Personal Loan</option>
                <option value="Home Loan">Home Loan</option>
                <option value="LAP">LAP (Loan Against Property)</option>
                <option value="Business Loan">Business Loan</option>
            </select>
            <button onclick="submitLoan()" id="lSubmitBtn" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT</button>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn" style="background:var(--wa-green);">WhatsApp Us</a>
        <button onclick="openModal('uploadModal')" class="f-btn" id="sellBtn" style="background:var(--secondary); color:var(--primary); border:none; display:none;">➕ Sell Now</button>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhi14LSxcRaSj_fxzZXvLGgP0hO7YAS6V_tZMNdZYApJ-vgKF_oDVdCKW9b9xr64nm/exec";
        const SHEETDB_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        let allAds = []; let userEmail = "";

        // ১. গুগল লগইন ট্র্যাকিং (Apps Script এ ডেটা যাবে)
        async function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email.toLowerCase();
            document.getElementById("loginSection").style.display = "none";
            document.getElementById('userProfile').style.display = "flex";
            document.getElementById('userImg').src = payload.picture;
            document.getElementById('sellBtn').style.display = "flex";

            // লগইন ট্র্যাকিং ডেটা শিটে পাঠানো
            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'login', name: payload.name, email: userEmail })
            });
        }

        // ২. লোন সাবমিট (Apps Script + Telegram)
        async function submitLoan() {
            const name = document.getElementById('lName').value;
            const phone = document.getElementById('lPhone').value;
            if(!name || !phone) { alert("Name and Phone are mandatory!"); return; }

            const btn = document.getElementById('lSubmitBtn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            const loanData = {
                action: 'loan',
                name: name,
                phone: phone,
                email: document.getElementById('lEmail').value,
                address: document.getElementById('lAddr').value,
                occupation: document.getElementById('lOccu').value,
                employment: document.getElementById('lEmp').value,
                income: document.getElementById('lInc').value,
                loan_type: document.getElementById('lType').value
            };

            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(loanData) });
                alert("Success! Your application has been sent to Telegram & Sheet.");
                closeModal('loanModal');
            } catch(e) { alert("Error submitting application."); }
            finally { btn.innerText = "SUBMIT"; btn.disabled = false; }
        }

        // ৩. অ্যাড ফাংশনালিটি
        async function fetchAds() {
            try { const res = await fetch(SHEETDB_URL); allAds = await res.json(); renderAds(allAds); }
            catch (e) { document.getElementById('adsGrid').innerHTML = "Error loading ads!"; }
        }

        function renderAds(data) {
            const grid = document.getElementById('adsGrid'); grid.innerHTML = "";
            data.filter(ad => ad.Status !== 'Deleted').reverse().forEach(ad => {
                grid.innerHTML += `<div class="ad-card" onclick="alert('Contact: ${ad.Phone}')">
                    <img src="${ad.Image}">
                    <div style="padding:10px;">
                        <div style="font-size:18px; font-weight:bold;">Rs ${ad.Price}</div>
                        <div style="color:#555;">${ad.Name}</div>
                        <div style="font-size:12px; color:#777;">📍 ${ad.Address || 'Kolkata'}</div>
                    </div>
                </div>`;
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onload = fetchAds;
    </script>
</body>
</html>

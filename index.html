<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - India's Classified Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        
        header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .logo-img { height: 40px; }
        .search-box { flex-grow: 1; margin: 0 15px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-box input { border: none; padding: 8px; width: 100%; outline: none; }
        .search-box button { background: var(--primary); color: white; border: none; padding: 0 15px; cursor: pointer; }

        .nav-right { display: flex; align-items: center; gap: 10px; }
        #userProfile { display: none; align-items: center; gap: 8px; }
        #userProfile img { width: 30px; height: 30px; border-radius: 50%; }

        /* Categories Center */
        .categories { display: flex; justify-content: center; gap: 15px; padding: 15px; background: white; overflow-x: auto; border-bottom: 1px solid #ddd; }
        @media (max-width: 768px) { .categories { justify-content: flex-start; } }
        .cat-card { text-align: center; cursor: pointer; min-width: 70px; font-size: 12px; font-weight: bold; }
        .cat-icon { font-size: 24px; background: #f0f7ff; padding: 10px; border-radius: 50%; display: block; margin-bottom: 5px; }

        /* Ads Grid */
        .content { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .ad-card img { width: 100%; height: 140px; object-fit: cover; background: #eee; }
        .ad-info { padding: 10px; }
        .ad-price { font-size: 18px; font-weight: bold; }

        /* Floating buttons - Default Hidden */
        .sell-float { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--secondary); color: var(--primary); padding: 12px 25px; border-radius: 50px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 2000; border: 2px solid white; }

        /* Posters */
        .poster { position: relative; color: white; border-radius: 12px; padding: 30px; text-align: center; margin-bottom: 20px; background-size: cover; background-position: center; overflow: hidden; }
        .poster::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1; }
        .p-content { position: relative; z-index: 2; }
        .btn-yellow { background: var(--secondary); color: var(--primary); padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }

        /* Modal */
        #uploadModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <select id="langSwitcher" onchange="changeLang(this.value)">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिन्दी</option>
            </select>
            <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="icon"></div>
            <div id="userProfile">
                <img id="userImg" src=""><button onclick="location.reload()" style="font-size: 10px; border: none; background: none; color: red; cursor: pointer;">Logout</button>
            </div>
        </div>
    </header>

    <div class="categories" id="catBox">
        <div class="cat-card" onclick="filterCat('Mobile')"><span class="cat-icon">📱</span><span class="cat-name">Mobile</span></div>
        <div class="cat-card" onclick="filterCat('Laptop')"><span class="cat-icon">💻</span><span class="cat-name">Laptop</span></div>
        <div class="cat-card" onclick="filterCat('Camera')"><span class="cat-icon">📷</span><span class="cat-name">Camera</span></div>
        <div class="cat-card" onclick="filterCat('Electronics')"><span class="cat-icon">❄️</span><span class="cat-name">Electronics</span></div>
        <div class="cat-card" onclick="filterCat('Bike')"><span class="cat-icon">🚲</span><span class="cat-name">Bike</span></div>
    </div>

    <div class="content">
        <div class="poster" style="background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=1000');">
            <div class="p-content">
                <h3 id="lTitle">Need Financial Assistance?</h3>
                <p id="lDesc">Apply for Personal or Business loans easily.</p>
                <a href="https://forms.gle/1T8UoZ7W4Z43x93XA" target="_blank" class="btn-yellow" id="lBtn">APPLY FOR LOAN</a>
            </div>
        </div>

        <h3 id="viewTitle">Fresh Recommendations</h3>
        <div class="ads-grid" id="adsGrid">Loading...</div>
    </div>

    <a href="javascript:void(0)" onclick="openModal()" class="sell-float" id="sellBtn">➕ Sell Now</a>

    <div id="uploadModal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer; font-weight:bold;">&times; Close</span>
            <h3>Post Your Ad</h3>
            <input type="text" id="itemName" placeholder="Product Name">
            <input type="number" id="itemPrice" placeholder="Price (৳)">
            <select id="itemCat">
                <option value="Mobile">Mobile</option>
                <option value="Laptop">Laptop</option>
                <option value="Electronics">Electronics</option>
                <option value="Bike">Bike</option>
            </select>
            <textarea id="itemDesc" placeholder="Description"></textarea>
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="processUpload()" id="uploadBtn" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; cursor:pointer;">Publish</button>
        </div>
    </div>

    <script>
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        const SHEETDB_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";
        let allAds = [], userEmail = "";

        const langData = {
            en: { lTitle: "Need Financial Assistance?", lDesc: "Apply for loans easily.", lBtn: "APPLY FOR LOAN", sBtn: "➕ Sell Now", vTitle: "Fresh Recommendations", cats: ["Mobile", "Laptop", "Camera", "Electronics", "Bike"] },
            bn: { lTitle: "লোন প্রয়োজন?", lDesc: "সহজে পার্সোনাল বা বিজনেস লোনের আবেদন করুন।", lBtn: "লোনের আবেদন", sBtn: "➕ বিক্রি করুন", vTitle: "নতুন বিজ্ঞাপনসমূহ", cats: ["মোবাইল", "ল্যাপটপ", "ক্যামেরা", "ইলেকট্রনিক্স", "বাইক"] },
            hi: { lTitle: "ऋण की आवश्यकता है?", lDesc: "आसानी से ऋण के लिए आवेदन करें।", lBtn: "ऋण आवेदन", sBtn: "➕ बेचें", vTitle: "नई सिफारिशें", cats: ["मोबाइल", "लैपटॉप", "कैमरा", "इलेक्ट्रॉनिक्स", "बाइक"] }
        };

        function changeLang(l) {
            const d = langData[l];
            document.getElementById('lTitle').innerText = d.lTitle;
            document.getElementById('lDesc').innerText = d.lDesc;
            document.getElementById('lBtn').innerText = d.lBtn;
            document.getElementById('sellBtn').innerText = d.sBtn;
            document.getElementById('viewTitle').innerText = d.vTitle;
            const names = document.querySelectorAll('.cat-name');
            names.forEach((n, i) => n.innerText = d.cats[i]);
        }

        async function fetchAds() {
            const res = await fetch(SHEETDB_URL);
            allAds = await res.json();
            renderAds(allAds);
        }

        function renderAds(data) {
            const grid = document.getElementById('adsGrid');
            grid.innerHTML = data.length ? "" : "No Ads found.";
            data.reverse().forEach(ad => {
                grid.innerHTML += `
                    <div class="ad-card">
                        <img src="${ad.Image || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="ad-info">
                            <div class="ad-price">৳ ${ad.Price || '0'}</div>
                            <div style="font-size:14px; font-weight:bold;">${ad.Name || 'No Title'}</div>
                            <div style="font-size:10px; color:#666;">${ad.Category} • ${ad.Date}</div>
                        </div>
                    </div>`;
            });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            document.querySelector(".g_id_signin").style.display = "none";
            document.getElementById('userProfile').style.display = "flex";
            document.getElementById('userImg').src = payload.picture;
            document.getElementById('sellBtn').style.display = "block"; // লগইন করলে বাটন আসবে
        }

        async function processUpload() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Select an image");
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "Processing...";
            
            const fd = new FormData(); fd.append('image', file);
            const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const imgData = await imgRes.json();
            
            if(imgData.success) {
                await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [{ 
                        Email: userEmail,
                        Name: document.getElementById('itemName').value, 
                        Price: document.getElementById('itemPrice').value, 
                        Category: document.getElementById('itemCat').value,
                        Description: document.getElementById('itemDesc').value,
                        Image: imgData.data.url,
                        Date: new Date().toLocaleDateString()
                    }]})
                });
                alert("Success!"); location.reload();
            }
        }

        function searchAds() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderAds(allAds.filter(ad => ad.Name.toLowerCase().includes(q)));
        }

        function openModal() { document.getElementById('uploadModal').style.display='flex'; }
        function closeModal() { document.getElementById('uploadModal').style.display='none'; }
        window.onload = fetchAds;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - India's Classified Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #f2f4f5; color: var(--primary); }
        
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .logo-img { height: 60px; width: auto; object-fit: contain; }
        
        .hero { 
            background: linear-gradient(rgba(0, 47, 52, 0.75), rgba(0, 47, 52, 0.75)), 
                        url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; padding: 60px 20px; text-align: center; color: white;
        }

        /* Modal Style for Upload Form */
        #uploadModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
        }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }

        .categories { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; min-width: 80px; font-size: 13px; font-weight: bold; }
        .cat-icon { font-size: 28px; background: #f0f7ff; padding: 10px; border-radius: 50%; margin-bottom: 5px; }

        .content { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .btn-action { padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; border: none; cursor: pointer; }
        .btn-yellow { background: var(--secondary); color: var(--primary); width: 100%; margin-top: 10px; }

        .float-wrap { position: fixed; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .f-btn { padding: 15px 25px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 10px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .wa-float { background: var(--wa-green); }
        .sell-float { background: linear-gradient(135deg, #ffce32 0%, #ff9000 100%); color: #002f34; border: 2px solid white; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img" onerror="this.src='https://via.placeholder.com/150x60?text=BongoBiz'">
        </div>
        <div id="g_id_onload"
             data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </header>

    <div class="hero">
        <h2>BongoBiz Marketplace</h2>
        <p>Buy & Sell in West Bengal instantly</p>
    </div>

    <div id="uploadModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 style="margin-top:0;">Post Your Ad</h3>
            <input type="text" id="itemName" placeholder="Product Name (যেমন: iPhone 12)">
            <input type="number" id="itemPrice" placeholder="Price (৳)">
            <select id="itemCat">
                <option value="Mobile">Mobile</option>
                <option value="Laptop">Laptop</option>
                <option value="Bike">Bike</option>
                <option value="Other">Other</option>
            </select>
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="processUpload()" class="btn-action btn-yellow" id="uploadBtn">Publish Ad</button>
            <p id="status" style="font-size: 12px; color: #666; text-align: center;"></p>
        </div>
    </div>

    <div class="categories">
        <div class="cat-card"><div class="cat-icon">📱</div>Mobile</div>
        <div class="cat-card"><div class="cat-icon">💻</div>Laptop</div>
        <div class="cat-card"><div class="cat-icon">🚲</div>Bike</div>
        <div class="cat-card"><div class="cat-icon">🏠</div>Property</div>
    </div>

    <div class="content">
        <div style="background: white; padding: 40px; border-radius: 15px; text-align: center; border: 2px dashed #ccc;">
            <h3>Looking for something?</h3>
            <p>New ads will appear here soon.</p>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn wa-float"><span>💬</span> Support</a>
        <a href="javascript:void(0)" onclick="openModal()" class="f-btn sell-float">➕ Sell Now</a>
    </div>

    <script>
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        const SHEETDB_RESALE_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";

        function openModal() { document.getElementById('uploadModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }

        async function processUpload() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const cat = document.getElementById('itemCat').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');

            if(!name || !price || !file) { alert("সব তথ্য পূরণ করুন!"); return; }

            btn.disabled = true;
            btn.innerText = "Uploading Image...";
            status.innerText = "ইমেজ সার্ভারে পাঠানো হচ্ছে...";

            // 1. Upload to ImgBB
            const formData = new FormData();
            formData.append('image', file);

            try {
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const imgData = await imgRes.json();
                
                if(imgData.success) {
                    const finalImageUrl = imgData.data.url;
                    status.innerText = "Saving to Database...";
                    
                    // 2. Save to SheetDB
                    const sheetRes = await fetch(SHEETDB_RESALE_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            "data": [{
                                "Name": name,
                                "Price": price,
                                "Category": cat,
                                "Image_URL": finalImageUrl,
                                "Date": new Date().toLocaleString()
                            }]
                        })
                    });

                    if(sheetRes.ok) {
                        alert("আপনার বিজ্ঞাপনটি সফলভাবে পোস্ট হয়েছে!");
                        location.reload();
                    }
                }
            } catch (err) {
                alert("ভুল হয়েছে! আবার চেষ্টা করুন।");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "Publish Ad";
            }
        }

        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            // এখানে গুগল লগইন সফল হলে ইউজার প্রোফাইল সেভ করার কোড লেখা যাবে
        }
    </script>
</body>
</html>

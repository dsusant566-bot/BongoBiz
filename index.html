<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        
        header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .logo-img { height: 40px; }
        .search-container { flex-grow: 1; max-width: 450px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; margin: 0 10px; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; font-size: 14px; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 0 15px; cursor: pointer; }

        .nav-right { display: flex; align-items: center; gap: 8px; }
        #userProfile { display: none; align-items: center; gap: 5px; font-size: 12px; }
        #userImg { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ddd; }

        /* Posters */
        .content { max-width: 1000px; margin: 15px auto; padding: 0 15px; }
        .poster-box { position: relative; color: white; border-radius: 12px; padding: 40px 20px; text-align: center; margin-bottom: 20px; background-size: cover; background-position: center; overflow: hidden; }
        .poster-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .poster-content { position: relative; z-index: 2; }
        .loan-poster { background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071'); }
        .web-poster { background-image: url('https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=2070'); }

        .btn-action { padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; border: none; cursor: pointer; font-size: 14px; }
        .btn-yellow { background: var(--secondary); color: var(--primary); }
        .btn-wa { background: var(--wa-green); color: white; display: flex; align-items: center; gap: 8px; margin: 0 auto; width: fit-content; }

        /* Ads Grid */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .ad-card img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .ad-info { padding: 10px; }
        .ad-price { font-size: 18px; font-weight: bold; }
        .ad-title { font-size: 14px; color: #555; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-x { position: absolute; top: 5px; right: 15px; font-size: 40px; color: red; cursor: pointer; font-weight: bold; }

        .float-wrap { position: fixed; bottom: 20px; right: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid white; font-size: 14px; }
        .wa-float { background: var(--wa-green); }
        .sell-float { display: none; background: var(--secondary); color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <select id="langSwitcher" onchange="changeLang(this.value)" style="padding: 5px; border-radius: 4px;">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिन्दी</option>
            </select>
            <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="icon"></div>
            <div id="userProfile">
                <img id="userImg" src="">
                <button onclick="showMyAds()" id="myAdsBtn" style="border:none; background:none; color:blue; cursor:pointer; font-weight:bold;">My Ads</button>
            </div>
        </div>
    </header>

    <div class="content">
        <div class="poster-box loan-poster">
            <div class="poster-content">
                <h3 id="lTitle">Need Financial Assistance?</h3>
                <p id="lDesc">Apply for Personal or Business loans easily.</p>
                <a href="https://forms.gle/1T8UoZ7W4Z43x93XA" target="_blank" class="btn-action btn-yellow" id="lBtn">APPLY FOR LOAN</a>
            </div>
        </div>

        <h3 id="vTitle">Fresh Recommendations</h3>
        <div class="ads-grid" id="adsGrid">Loading...</div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('detailModal')">&times;</span>
            <img id="detImg" style="width:100%; border-radius:8px; height:200px; object-fit:cover;">
            <h2 id="detPrice" style="margin:15px 0;"></h2>
            <h3 id="detTitle"></h3>
            <p id="detDesc" style="background:#f0f0f0; padding:10px; border-radius:5px;"></p>
            <a id="detCall" href="" class="btn-action btn-yellow" style="width:100%; text-align:center; box-sizing:border-box; display:block; margin-bottom:10px;">📞 Call Seller</a>
            <a id="detWA" href="" target="_blank" class="btn-wa" style="width:100%; box-sizing:border-box;">💬 WhatsApp</a>
        </div>
    </div>

    <div id="myAdsModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('myAdsModal')">&times;</span>
            <h3 id="myAdsTitle">My Ads</h3>
            <div id="myAdsList"></div>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn wa-float"><span id="waText">Contact Us</span></a>
        <a href="javascript:void(0)" onclick="openModal('uploadModal')" class="f-btn sell-float" id="sellBtn"><span id="sBtnText">➕ Sell Now</span></a>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('uploadModal')">&times;</span>
            <h3 id="upTitle">Post Your Ad</h3>
            <input type="text" id="itemName" placeholder="Product Name">
            <input type="number" id="itemPrice" placeholder="Price">
            <input type="tel" id="itemPhone" placeholder="Phone Number">
            <textarea id="itemDesc" rows="3" placeholder="Details..."></textarea>
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="processUpload()" id="uploadBtn" class="btn-action btn-yellow" style="width:100%; margin-top:10px;">Submit</button>
        </div>
    </div>

    <script>
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        const SHEETDB_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";
        let allAds = []; let userEmail = "";

        const langData = {
            en: { lTitle: "Need Financial Assistance?", lDesc: "Apply for loans easily.", lBtn: "APPLY FOR LOAN", vTitle: "Fresh Recommendations", sBtn: "➕ Sell Now", wa: "Contact Us", my: "My Ads" },
            bn: { lTitle: "লোন প্রয়োজন?", lDesc: "সহজে লোনের আবেদন করুন।", lBtn: "লোনের আবেদন", vTitle: "নতুন বিজ্ঞাপনসমূহ", sBtn: "➕ বিক্রি করুন", wa: "যোগাযোগ করুন", my: "আমার বিজ্ঞাপন" },
            hi: { lTitle: "ऋण चाहिए?", lDesc: "आसानी से आवेदन करें।", lBtn: "ऋण आवेदन", vTitle: "नई सिफारिशें", sBtn: "➕ बेचें", wa: "संपर्क करें", my: "मेरे विज्ञापन" }
        };

        function changeLang(l) {
            const d = langData[l];
            document.getElementById('lTitle').innerText = d.lTitle;
            document.getElementById('lDesc').innerText = d.lDesc;
            document.getElementById('lBtn').innerText = d.lBtn;
            document.getElementById('vTitle').innerText = d.vTitle;
            document.getElementById('sBtnText').innerText = d.sBtn;
            document.getElementById('waText').innerText = d.wa;
            document.getElementById('myAdsBtn').innerText = d.my;
        }

        async function fetchAds() {
            const res = await fetch(SHEETDB_URL);
            allAds = await res.json();
            renderAds(allAds);
        }

        function renderAds(data) {
            const grid = document.getElementById('adsGrid'); grid.innerHTML = "";
            data.reverse().forEach(ad => {
                const card = document.createElement('div');
                card.className = 'ad-card';
                card.onclick = () => showDetails(ad);
                card.innerHTML = `<img src="${ad.Image || ad.image || ''}"><div class="ad-info"><div class="ad-price">৳ ${ad.Price || ad.price}</div><div class="ad-title">${ad.Name || ad.name}</div></div>`;
                grid.appendChild(card);
            });
        }

        function showDetails(ad) {
            document.getElementById('detImg').src = ad.Image || ad.image;
            document.getElementById('detPrice').innerText = "৳ " + (ad.Price || ad.price);
            document.getElementById('detTitle').innerText = ad.Name || ad.name;
            document.getElementById('detDesc').innerText = ad.Description || ad.description || "No details.";
            document.getElementById('detCall').href = "tel:" + (ad.Phone || ad.phone);
            document.getElementById('detWA').href = `https://wa.me/${ad.Phone || ad.phone}`;
            openModal('detailModal');
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email.toLowerCase(); // Lowercase for matching
            document.querySelector(".g_id_signin").style.display = "none";
            document.getElementById('userProfile').style.display = "flex";
            document.getElementById('userImg').src = payload.picture;
            document.getElementById('sellBtn').style.display = "flex";
        }

        function showMyAds() {
            const myAds = allAds.filter(ad => (ad.Email || ad.email || "").toLowerCase() === userEmail);
            const list = document.getElementById('myAdsList');
            list.innerHTML = myAds.length ? "" : "<p>No ads found.</p>";
            myAds.forEach(ad => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${ad.Name || ad.name}</span>
                    <button onclick="deleteAd('${ad.Name || ad.name}')" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">Delete</button>
                </div>`;
            });
            openModal('myAdsModal');
        }

        async function deleteAd(name) {
            if(confirm("Delete this ad?")) {
                await fetch(`${SHEETDB_URL}/Name/${name}`, { method: 'DELETE' });
                location.reload();
            }
        }

        async function processUpload() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Select Image");
            const btn = document.getElementById('uploadBtn'); btn.disabled = true; btn.innerText = "Processing...";
            const fd = new FormData(); fd.append('image', file);
            const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const imgData = await imgRes.json();
            if(imgData.success) {
                await fetch(SHEETDB_URL, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [{ 
                        Email: userEmail, Name: document.getElementById('itemName').value, 
                        Price: document.getElementById('itemPrice').value, Description: document.getElementById('itemDesc').value,
                        Phone: document.getElementById('itemPhone').value, Image: imgData.data.url, Date: new Date().toLocaleDateString()
                    }]})
                });
                location.reload();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function searchAds() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderAds(allAds.filter(ad => (ad.Name || ad.name || "").toLowerCase().includes(q)));
        }
        window.onload = fetchAds;
    </script>
</body>
</html>

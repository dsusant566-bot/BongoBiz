<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        
        /* Header & Nav */
        header { background: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .logo-img { height: 40px; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        #userProfile { display: none; align-items: center; gap: 12px; }
        #userImg { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }
        .fav-btn-nav { font-size: 22px; cursor: pointer; color: #ff4d4d; transition: 0.3s; }
        .fav-btn-nav:hover { transform: scale(1.2); }

        /* Modals Logic */
        #uploadModal, #detailModal, #loanModal, #myAdsModal, #favModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        
        /* LOGIN MODAL FRONT FIX */
        #customLoginModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000 !important; justify-content: center; align-items: center; }
        
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 92%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; text-align: center; }
        .close-x { position: absolute; top: 5px; right: 15px; font-size: 40px; color: red; cursor: pointer; font-weight: bold; }

        /* Ads Grid & Cards */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; transition: 0.2s; }
        .ad-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .ad-card img { width: 100%; height: 140px; object-fit: cover; }
        .fav-heart { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border-radius: 50%; padding: 5px; cursor: pointer; z-index: 10; font-size: 18px; }

        /* Buttons */
        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; color: white; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: none; font-size: 14px; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 8px; font-weight: bold; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="nav-right">
            <select id="langSwitcher">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिन्दी</option>
            </select>
            <div id="loginSection">
                <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
            </div>
            <div id="userProfile">
                <span class="fav-btn-nav" onclick="openModal('favModal')" title="Favorites">❤️</span>
                <img id="userImg" src="">
                <button onclick="showMyAds()" style="background:none; border:none; color:#007bff; font-weight:900; cursor:pointer;">MY ADS</button>
            </div>
        </div>
    </header>

    <div class="hero" style="text-align: center; padding: 20px; background: #fff;">
        <h2 id="hTitle">India's Own Classified Marketplace</h2>
        <p id="hSub">Buy, Sell & Explore Deals</p>
    </div>

    <div class="ads-grid" id="adsGrid">Loading Ads...</div>

    <div id="favModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('favModal')">&times;</span>
            <h3 id="favTitle">Favorite Items</h3>
            <div id="favContainer"></div>
        </div>
    </div>

    <div id="myAdsModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('myAdsModal')">&times;</span>
            <h3 id="myAdsTitle">Manage My Ads</h3>
            <div id="myAdsContainer"></div>
        </div>
    </div>

    <div id="customLoginModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('customLoginModal')">&times;</span>
            <h3>Login Required</h3>
            <p>Please login with Google to continue.</p>
            <div style="display: flex; justify-content: center; margin-top: 15px;">
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('detailModal')">&times;</span>
            <img id="detImg" style="width:100%; border-radius:8px; margin-bottom:15px;">
            <h2 id="detPrice" style="color:var(--primary); margin:5px 0;"></h2>
            <h3 id="detTitle" style="margin-bottom:10px;"></h3>
            <p id="detDesc" style="color:#555; text-align:left; font-size:14px;"></p>
            <hr>
            <button id="callBtn" style="background:var(--secondary); width:100%; padding:14px; border:none; border-radius:50px; font-weight:bold; margin-bottom:10px; cursor:pointer;">📞 Call Now</button>
            <button id="waBtn" style="background:var(--wa-green); color:white; width:100%; padding:14px; border:none; border-radius:50px; font-weight:bold; cursor:pointer;">💬 WhatsApp</button>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn" style="background:var(--wa-green); text-decoration:none;">WhatsApp Us</a>
        <button onclick="checkLoginAndOpen('uploadModal')" class="f-btn" id="sellBtnStatic" style="background:#ffce32; border:none; color:#002f34; cursor:pointer;">➕ Sell Now</button>
    </div>

    <script>
        // আপনার নতুন Deployment URL এখানে বসাবেন 👇
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyV3OxANu9jbWzX7oEuqMzc4vhoM4ouuYKopW5c_DvnBpUk3BKra_2Kc9L7T-eu3N8o/exec";
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        
        let allAds = []; 
        let userEmail = ""; 
        let favorites = JSON.parse(localStorage.getItem('favAds')) || [];

        async function fetchAds() {
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                allAds = await res.json();
                renderAds(allAds);
            } catch (e) { console.error("Data fetch error"); }
        }

        function renderAds(data) {
            const grid = document.getElementById('adsGrid'); 
            grid.innerHTML = "";
            data.filter(ad => ad.Status !== 'Deleted').reverse().forEach(ad => {
                const isFav = favorites.some(f => f.Name === ad.Name);
                const card = document.createElement('div'); 
                card.className = 'ad-card';
                card.innerHTML = `
                    <div class="fav-heart" onclick="toggleFav('${ad.Name}', event)">${isFav ? '❤️' : '🤍'}</div>
                    <img src="${ad.Image}" onclick="showDetails('${ad.Name}')">
                    <div style="padding:10px;">
                        <div style="font-size:16px; font-weight:900;">Rs ${ad.Price}</div>
                        <div style="font-size:13px; color:#555;">${ad.Name}</div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function toggleFav(adName, event) {
            event.stopPropagation();
            const ad = allAds.find(a => a.Name === adName);
            const index = favorites.findIndex(f => f.Name === adName);
            if (index > -1) favorites.splice(index, 1);
            else favorites.push(ad);
            localStorage.setItem('favAds', JSON.stringify(favorites));
            renderAds(allAds);
        }

        function showMyAds() {
            const container = document.getElementById('myAdsContainer'); 
            container.innerHTML = "";
            const myAds = allAds.filter(ad => ad.Email === userEmail && ad.Status !== 'Deleted');
            if(myAds.length === 0) container.innerHTML = "<p>You haven't posted any ads yet.</p>";
            myAds.forEach(ad => {
                const item = document.createElement('div');
                item.style = "border-bottom:1px solid #eee; padding:10px; text-align:left; display:flex; justify-content:space-between; align-items:center;";
                item.innerHTML = `<div><b>${ad.Name}</b><br>Rs ${ad.Price}</div>
                                  <button class="del-btn" onclick="deleteAd('${ad.Name}')">Delete</button>`;
                container.appendChild(item);
            });
            openModal('myAdsModal');
        }

        async function deleteAd(name) {
            if(!confirm("Are you sure you want to delete this ad?")) return;
            // এই ফাংশনটি Apps Script-এ 'action: deleteAd' পাঠাবে
            await fetch(APPS_SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: 'deleteAd', email: userEmail, name: name }) 
            });
            alert("Ad Deleted successfully!");
            location.reload();
        }

        function showDetails(name) {
            const ad = allAds.find(a => a.Name === name);
            document.getElementById('detImg').src = ad.Image;
            document.getElementById('detPrice').innerText = "Rs " + ad.Price;
            document.getElementById('detTitle').innerText = ad.Name;
            document.getElementById('detDesc').innerText = ad.Description;
            
            document.getElementById('callBtn').onclick = () => userEmail ? window.location.href="tel:"+ad.Phone : triggerGoogleLogin();
            document.getElementById('waBtn').onclick = () => userEmail ? window.open("https://wa.me/91"+ad.Phone) : triggerGoogleLogin();
            
            openModal('detailModal');
        }

        async function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email.toLowerCase();
            document.getElementById("loginSection").style.display = "none";
            document.getElementById('userProfile').style.display = "flex";
            document.getElementById('userImg').src = payload.picture;
            closeModal('customLoginModal');
            // লগইন ডাটা শিটে পাঠানো
            fetch(APPS_SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: 'login', name: payload.name, email: userEmail }) 
            });
        }

        const translations = {
            en: { hT: "India's Own Classified Marketplace", myA: "Manage My Ads", fav: "Favorite Items" },
            bn: { hT: "ভারতের নিজস্ব মার্কেটপ্লেস", myA: "আমার বিজ্ঞাপন ম্যানেজ করুন", fav: "প্রিয় তালিকা" },
            hi: { hT: "भारत का अपना मार्केटप्लेस", myA: "मेरे विज्ञापन प्रबंधित करें", fav: "पसंदीदा चीजें" }
        };

        document.getElementById('langSwitcher').onchange = (e) => {
            const val = e.target.value;
            document.getElementById('hTitle').innerText = translations[val].hT;
            document.getElementById('myAdsTitle').innerText = translations[val].myA;
            document.getElementById('favTitle').innerText = translations[val].fav;
        };

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function triggerGoogleLogin() { openModal('customLoginModal'); }
        function checkLoginAndOpen(id) { userEmail ? openModal(id) : triggerGoogleLogin(); }

        window.onload = fetchAds;
    </script>
    
    <footer style="text-align:center; padding:20px; background:white; border-top:2px solid #ffce32; margin-top:30px;">
        <p><b>BongoBiz</b> - Kolkata, West Bengal</p>
        <p>Contact: 9733335466 | bongobiz.official@gmail.com</p>
    </footer>
</body>
</html>

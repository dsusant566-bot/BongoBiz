<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Classified Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        header { background: #fff; padding: 10px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); gap: 10px; }
        .logo-img { height: 45px; width: auto; }
        .search-container { flex-grow: 1; max-width: 500px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .login-btn-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 2.5px solid #002f34; padding: 4px 12px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .login-text-bold { font-size: 14px; font-weight: 900; color: #002f34; text-transform: uppercase; letter-spacing: 0.5px; }
        #userProfile { display: none; align-items: center; gap: 8px; font-size: 12px; }
        #userImg { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }
        .hero { background: linear-gradient(rgba(0,47,52,0.7), rgba(0,47,52,0.7)), url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070'); background-size: cover; padding: 30px 20px; text-align: center; color: white; }
        .categories { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; cursor: pointer; min-width: 75px; font-size: 11px; font-weight: bold; color: inherit; }
        .cat-icon { font-size: 24px; background: #f0f7ff; padding: 10px; border-radius: 50%; margin-bottom: 5px; display: inline-block; }
        .content { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .poster-box { position: relative; color: white; border-radius: 12px; padding: 40px 20px; text-align: center; margin-bottom: 25px; overflow: hidden; background-size: cover; background-position: center; }
        .poster-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .poster-content { position: relative; z-index: 2; }
        .loan-poster { background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071'); }
        .web-poster { background-image: url('https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=2070'); }
        .btn-action { padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; border: none; cursor: pointer; }
        .btn-yellow { background: var(--secondary); color: var(--primary); }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .ad-card img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .ad-info { padding: 10px; }
        .ad-price { font-size: 18px; font-weight: 900; }
        #uploadModal, #myAdsModal, #detailModal, #loanModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; text-align: center; }
        .close-x { position: absolute; top: 5px; right: 15px; font-size: 45px; color: red; cursor: pointer; font-weight: bold; z-index: 10001; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid white; font-size: 14px; }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Products...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <select id="langSwitcher" class="lang-dropdown">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
            </select>
            <div id="loginSection">
                <div class="login-btn-box">
                    <span class="login-text-bold">LOGIN</span>
                    <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                </div>
            </div>
            <div id="userProfile">
                <img id="userImg" src="">
                <button onclick="showMyAds()" id="myAdsBtn" style="background:none; border:none; color:blue; cursor:pointer; font-weight:bold;">My Ads</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1 id="hTitle">India's Own Classified Marketplace</h1>
        <p id="hSub">Buy, Sell & Apply for Loans</p>
    </div>

    <div class="categories">
        <div class="cat-card" onclick="filterCat('Resale')"><div class="cat-icon">🛍️</div><div id="c1">Resale</div></div>
        <div class="cat-card" onclick="filterCat('Wholesale')"><div class="cat-icon">📦</div><div id="c2">Wholesale</div></div>
        <div class="cat-card" onclick="filterCat('Property')"><div class="cat-icon">🏠</div><div id="c3">Property</div></div>
    </div>

    <div class="content">
        <div class="poster-box loan-poster">
            <div class="poster-content">
                <h3 id="lTitle">Need Financial Assistance?</h3>
                <p id="lDesc">Apply for Personal or Business loans easily.</p>
                <button onclick="openModal('loanModal')" class="btn-action btn-yellow" id="lBtn">APPLY FOR LOAN</button>
            </div>
        </div>
        <div class="ads-grid" id="adsGrid">Loading data...</div>
    </div>

    <div id="loanModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('loanModal')">&times;</span>
            <h3>Loan Application</h3>
            <input type="text" id="loanName" placeholder="Full Name *">
            <input type="tel" id="loanPhone" placeholder="Phone Number *">
            <input type="email" id="loanEmail" placeholder="Email ID">
            <input type="text" id="loanAddr" placeholder="Address">
            <input type="text" id="loanOccu" placeholder="Occupation">
            <select id="loanEmp">
                <option value="">Employment Type</option>
                <option value="Salaried">Salaried</option>
                <option value="Business">Business</option>
            </select>
            <input type="number" id="loanInc" placeholder="Monthly Income">
            <select id="loanType">
                <option value="Personal Loan">Select Loan Type</option>
                <option value="Home Loan">Home Loan</option>
                <option value="Business Loan">Business Loan</option>
                <option value="Personal Loan">Personal Loan</option>
            </select>
            <button onclick="submitLoan()" id="loanSubmitBtn" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT APPLICATION</button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "আপনার_নতুন_ডিপ্লয়মেন্ট_ইউআরএল_এখানে_বসান"; // IMPORTANT: Change this!
        const SHEETDB_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";
        let allAds = []; let userEmail = "";

        async function fetchAds() { try { const res = await fetch(SHEETDB_URL); allAds = await res.json(); renderAds(allAds); } catch (e) { console.error("Error loading ads"); } }
        
        function renderAds(data) { 
            const grid = document.getElementById('adsGrid'); grid.innerHTML = ""; 
            data.filter(ad => ad.Status !== 'Deleted').reverse().forEach(ad => { 
                const card = document.createElement('div'); card.className = 'ad-card'; 
                card.innerHTML = `<img src="${ad.Image || ''}"><div class="ad-info"><div class="ad-price">Rs ${ad.Price || '0'}</div><div class="ad-title">${ad.Name || 'Untitled'}</div></div>`; 
                grid.appendChild(card); 
            }); 
        }

        async function handleCredentialResponse(response) { 
            const payload = JSON.parse(atob(response.credential.split('.')[1])); 
            userEmail = payload.email.toLowerCase(); 
            document.getElementById("loginSection").style.display = "none"; 
            document.getElementById('userProfile').style.display = "flex"; 
            document.getElementById('userImg').src = payload.picture; 
            // লগইন ডেটা পাঠানো
            fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'login', name: payload.name, email: userEmail }) });
        }

        // লোন সাবমিট করার ফাংশন (সংশোধিত)
        async function submitLoan() {
            const loanData = {
                action: 'loan',
                name: document.getElementById('loanName').value,
                phone: document.getElementById('loanPhone').value,
                email: document.getElementById('loanEmail').value || "N/A",
                address: document.getElementById('loanAddr').value || "N/A",
                occupation: document.getElementById('loanOccu').value || "N/A",
                employment: document.getElementById('loanEmp').value || "N/A", 
                income: document.getElementById('loanInc').value || "0",
                loan_type: document.getElementById('loanType').value
            };

            if(!loanData.name || !loanData.phone) { alert("নাম এবং ফোন নম্বর দিন!"); return; }

            const btn = document.getElementById('loanSubmitBtn');
            btn.innerText = "পাঠানো হচ্ছে..."; btn.disabled = true;

            try {
                await fetch(APPS_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(loanData) 
                });
                alert("আবেদনটি সফলভাবে জমা হয়েছে!");
                closeModal('loanModal');
                document.querySelectorAll('#loanModal input, #loanModal select').forEach(i => i.value = "");
            } catch(e) { alert("সমস্যা হয়েছে!"); } 
            finally { btn.innerText = "SUBMIT APPLICATION"; btn.disabled = false; }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onload = fetchAds;
    </script>
</body>
</html>

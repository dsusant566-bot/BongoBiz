<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        header { background: #fff; padding: 10px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); gap: 10px; }
        .logo-img { height: 45px; width: auto; }
        .search-container { flex-grow: 1; max-width: 500px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        #userProfile { display: none; align-items: center; gap: 10px; }
        #userImg { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }
        .hero { background: linear-gradient(rgba(0,47,52,0.7), rgba(0,47,52,0.7)), url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070'); background-size: cover; padding: 30px 20px; text-align: center; color: white; }
        .categories { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; cursor: pointer; min-width: 75px; font-size: 11px; font-weight: bold; }
        .cat-icon { font-size: 24px; background: #f0f7ff; padding: 10px; border-radius: 50%; margin-bottom: 5px; display: inline-block; }
        .poster-box { position: relative; color: white; border-radius: 12px; padding: 40px 20px; text-align: center; margin-bottom: 25px; overflow: hidden; background-size: cover; background-position: center; }
        .poster-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .poster-content { position: relative; z-index: 2; }
        .loan-poster { background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071'); }
        .btn-action { padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; border: none; cursor: pointer; background: var(--secondary); color: var(--primary); }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; padding: 0 15px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .ad-card img { width: 100%; height: 150px; object-fit: cover; }
        #uploadModal, #loanModal, #myAdsModal, #customLoginModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; text-align: center; }
        .close-x { position: absolute; top: 5px; right: 15px; font-size: 45px; color: red; cursor: pointer; font-weight: bold; }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid white; }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Products...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <select id="langSwitcher" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिन्दी</option>
            </select>
            <div id="loginSection">
                <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
            </div>
            <div id="userProfile">
                <img id="userImg" src="">
                <button onclick="showMyAds()" id="myAdsBtn" style="background:none; border:none; color:blue; cursor:pointer; font-weight:bold;">MY ADS</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1 id="hTitle">India's Own Classified Marketplace</h1>
        <p id="hSub">Buy, Sell & Apply for Loans</p>
    </div>

    <div class="categories">
        <div class="cat-card" onclick="filterCat('Resale')"><div class="cat-icon">🛍️</div><div id="c1">Resale</div></div>
        <div class="cat-card" onclick="filterCat('Wholesale')"><div class="cat-icon">📦</div><div id="c2">Wholesale</div></div>
        <div class="cat-card" onclick="filterCat('Property')"><div class="cat-icon">🏠</div><div id="c3">Property</div></div>
    </div>

    <div class="content">
        <div class="poster-box loan-poster">
            <div class="poster-content">
                <h3 id="lTitle">Need Financial Assistance?</h3>
                <p id="lDesc">Apply for Personal or Business loans easily.</p>
                <button onclick="openModal('loanModal')" class="btn-action">APPLY FOR LOAN</button>
            </div>
        </div>
        <h3 id="viewTitle">Fresh Recommendations</h3>
        <div class="ads-grid" id="adsGrid">Loading data...</div>
    </div>

    <div id="loanModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('loanModal')">&times;</span>
            <h3>Loan Application</h3>
            <input type="text" id="loanName" placeholder="Full Name">
            <input type="tel" id="loanPhone" placeholder="Phone Number">
            <input type="email" id="loanEmail" placeholder="Email Address">
            <input type="text" id="loanAddress" placeholder="Address">
            <select id="loanOcc">
                <option value="">Occupation</option>
                <option value="Service">Service</option>
                <option value="Business">Business</option>
                <option value="Self-Employed">Self-Employed</option>
            </select>
            <select id="loanType">
                <option value="">Loan Type</option>
                <option value="Personal">Personal Loan</option>
                <option value="Business">Business Loan</option>
                <option value="Home">Home Loan</option>
            </select>
            <input type="number" id="loanAmount" placeholder="Loan Amount">
            <button onclick="processLoan()" id="loanBtn" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:8px;">Submit Application</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('uploadModal')">&times;</span>
            <h3 id="postTitle">Post Your Ad</h3>
            <input type="hidden" id="editOldName">
            <select id="itemCat"><option value="Resale">Resale</option><option value="Wholesale">Wholesale</option><option value="Property">Property</option></select>
            <input type="text" id="itemName" placeholder="Product Name">
            <input type="number" id="itemPrice" placeholder="Price">
            <input type="tel" id="itemPhone" placeholder="Phone">
            <input type="text" id="itemAddress" placeholder="Location">
            <textarea id="itemDesc" placeholder="Details"></textarea>
            <div id="imgSection"><input type="file" id="fileInput" accept="image/*"></div>
            <button onclick="processUpload()" id="uploadBtn" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:8px;">Submit</button>
        </div>
    </div>

    <div id="myAdsModal" class="modal"><div class="modal-content"><span class="close-x" onclick="closeModal('myAdsModal')">&times;</span><h3 id="myAdsTitle">Manage My Ads</h3><div id="myAdsContainer"></div></div></div>
    <div id="customLoginModal" class="modal"><div class="modal-content"><span class="close-x" onclick="closeModal('customLoginModal')">&times;</span><h3>Please Login</h3><div class="g_id_signin" data-type="standard"></div></div></div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn" style="background:var(--wa-green); text-decoration:none;">WhatsApp Us</a>
        <button onclick="checkLoginAndOpen('uploadModal')" class="f-btn" id="sellBtnStatic" style="background:#ffce32; border:none; color:#002f34; cursor:pointer;">➕ Sell Now</button>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyV3OxANu9jbWzX7oEuqMzc4vhoM4ouuYKopW5c_DvnBpUk3BKra_2Kc9L7T-eu3N8o/exec";
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        let allAds = []; let userEmail = "";

        const trans = {
            en: { hTitle: "India's Own Classified Marketplace", hSub: "Buy, Sell & Apply for Loans", viewTitle: "Fresh Recommendations", sellBtn: "➕ Sell Now", myA: "MY ADS", c1: "Resale", c2: "Wholesale", c3: "Property" },
            bn: { hTitle: "ভারতের নিজস্ব ক্লাসিফাইড মার্কেটপ্লেস", hSub: "কেনা-বেচা এবং লোনের আবেদন করুন", viewTitle: "নতুন বিজ্ঞাপন", sellBtn: "➕ বিক্রি করুন", myA: "আমার অ্যাড", c1: "রিসেল", c2: "হোলসেল", c3: "প্রপার্টি" },
            hi: { hTitle: "भारत का अपना मार्केटप्लेस", hSub: "खरीदें, बेचें और ऋण आवेदन करें", viewTitle: "नई सिफारिशें", sellBtn: "➕ अभी बेचें", myA: "मेरे विज्ञापन", c1: "रीसेल", c2: "थोक", c3: "संपत्ति" }
        };

        function changeLanguage(val) {
            const l = trans[val];
            document.getElementById('hTitle').innerText = l.hTitle;
            document.getElementById('hSub').innerText = l.hSub;
            document.getElementById('viewTitle').innerText = l.viewTitle;
            document.getElementById('sellBtnStatic').innerText = l.sellBtn;
            document.getElementById('myAdsBtn').innerText = l.myA;
            document.getElementById('c1').innerText = l.c1;
            document.getElementById('c2').innerText = l.c2;
            document.getElementById('c3').innerText = l.c3;
        }

        function checkAutoLogin() {
            const saved = localStorage.getItem('loggedUser');
            if(saved) {
                const user = JSON.parse(saved); userEmail = user.email;
                document.getElementById("loginSection").style.display = "none";
                document.getElementById('userProfile').style.display = "flex";
                document.getElementById('userImg').src = user.picture;
            }
        }

        function logout() { localStorage.removeItem('loggedUser'); location.reload(); }

        async function fetchAds() { 
            const res = await fetch(APPS_SCRIPT_URL); allAds = await res.json(); renderAds(allAds); 
        }

        function renderAds(data) {
            const grid = document.getElementById('adsGrid'); grid.innerHTML = "";
            data.filter(ad => ad.Status !== 'Deleted').reverse().forEach(ad => {
                grid.innerHTML += `<div class="ad-card">
                    <img src="${ad.Image}"><div style="padding:10px;"><b>Rs ${ad.Price}</b><br>${ad.Name}</div>
                </div>`;
            });
        }

        function showMyAds() {
            const container = document.getElementById('myAdsContainer'); container.innerHTML = "";
            allAds.filter(ad => ad.Email === userEmail && ad.Status !== 'Deleted').forEach(ad => {
                container.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px; text-align:left;">
                    <b>${ad.Name}</b> (Rs ${ad.Price}) <br>
                    <button onclick="openEditForm('${ad.Name}')" style="background:#007bff; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Edit</button>
                    <button onclick="deleteAd('${ad.Name}')" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; margin-left:5px;">Delete</button>
                </div>`;
            });
            openModal('myAdsModal');
        }

        function openEditForm(name) {
            const ad = allAds.find(a => a.Name === name);
            document.getElementById('editOldName').value = ad.Name;
            document.getElementById('itemName').value = ad.Name;
            document.getElementById('itemPrice').value = ad.Price;
            document.getElementById('itemPhone').value = ad.Phone;
            document.getElementById('itemAddress').value = ad.Address;
            document.getElementById('itemDesc').value = ad.Description;
            document.getElementById('itemCat').value = ad.Category;
            document.getElementById('imgSection').style.display = "none";
            document.getElementById('postTitle').innerText = "Edit Your Ad";
            closeModal('myAdsModal');
            openModal('uploadModal');
        }

        async function processUpload() {
            const btn = document.getElementById('uploadBtn'); btn.disabled = true;
            const oldName = document.getElementById('editOldName').value;
            let imgUrl = "";
            if(!oldName) {
                const file = document.getElementById('fileInput').files[0];
                if(file) {
                    const fd = new FormData(); fd.append('image', file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                    const imgData = await res.json(); imgUrl = imgData.data.url;
                }
            }
            const payload = {
                action: oldName ? 'editAd' : 'uploadAd', email: userEmail, Email: userEmail,
                oldName: oldName, newName: document.getElementById('itemName').value,
                newPrice: document.getElementById('itemPrice').value, newPhone: document.getElementById('itemPhone').value,
                newAddress: document.getElementById('itemAddress').value, newDesc: document.getElementById('itemDesc').value,
                Name: document.getElementById('itemName').value, Price: document.getElementById('itemPrice').value,
                Phone: document.getElementById('itemPhone').value, Address: document.getElementById('itemAddress').value,
                Description: document.getElementById('itemDesc').value, Category: document.getElementById('itemCat').value, Image: imgUrl
            };
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Success!"); location.reload();
        }

        async function processLoan() {
            const payload = {
                action: 'loan',
                name: document.getElementById('loanName').value,
                phone: document.getElementById('loanPhone').value,
                email: document.getElementById('loanEmail').value, // Email Field যুক্ত হলো
                address: document.getElementById('loanAddress').value,
                occupation: document.getElementById('loanOcc').value,
                loan_type: document.getElementById('loanType').value,
                loan_amount: document.getElementById('loanAmount').value
            };
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Application Submitted!"); closeModal('loanModal');
        }

        async function deleteAd(name) {
            if(confirm("Delete?")) {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteAd', email: userEmail, name: name }) });
                location.reload();
            }
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('loggedUser', JSON.stringify({ email: payload.email.toLowerCase(), picture: payload.picture }));
            location.reload();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'uploadModal') { document.getElementById('editOldName').value = ""; document.getElementById('postTitle').innerText = "Post Your Ad"; document.getElementById('imgSection').style.display = "block"; }
        }
        function checkLoginAndOpen(id) { userEmail ? openModal(id) : openModal('customLoginModal'); }
        window.onload = () => { checkAutoLogin(); fetchAds(); };
    </script>
</body>
</html>

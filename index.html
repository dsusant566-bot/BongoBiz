<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        header { background: #fff; padding: 10px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); gap: 10px; }
        .logo-img { height: 45px; }
        .search-container { flex-grow: 1; max-width: 500px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        #userImg { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }
        .hero { background: linear-gradient(rgba(0,47,52,0.7), rgba(0,47,52,0.7)), url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070'); background-size: cover; padding: 30px 20px; text-align: center; color: white; }
        .categories { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; cursor: pointer; min-width: 80px; font-weight: bold; }
        .cat-icon { font-size: 24px; background: #f0f7ff; padding: 10px; border-radius: 50%; display: inline-block; }
        .content { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .poster-box { position: relative; color: white; border-radius: 12px; padding: 40px 20px; text-align: center; margin-bottom: 25px; background-size: cover; background-position: center; overflow: hidden; }
        .poster-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .poster-content { position: relative; z-index: 2; }
        .loan-poster { background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2071'); }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .ad-card img { width: 100%; height: 150px; object-fit: cover; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; text-align: center; }
        .close-x { position: absolute; top: 5px; right: 15px; font-size: 35px; color: red; cursor: pointer; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .wa-float { background: var(--wa-green); padding: 12px 20px; border-radius: 50px; color: white; font-weight: bold; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Property, Items...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <select id="langSwitcher" style="padding:5px; border-radius:4px; font-weight:bold;">
                <option value="en">English</option>
                <option value="bn">বাংলা</option>
            </select>
            <div id="loginSection"><div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div><div class="g_id_signin" data-type="icon"></div></div>
            <div id="userProfile" style="display:none;"><img id="userImg" src=""><button onclick="showMyAds()" style="background:none; border:none; color:blue; cursor:pointer;">My Ads</button></div>
        </div>
    </header>

    <div class="hero">
        <h1 style="color:var(--secondary); font-size:45px;">BongoBiz</h1>
        <p>India's Own Classified Marketplace</p>
    </div>

    <div class="categories">
        <div class="cat-card" onclick="filterCat('Resale')"><div class="cat-icon">🛍️</div><div>Resale</div></div>
        <div class="cat-card" onclick="filterCat('Wholesale')"><div class="cat-icon">📦</div><div>Wholesale</div></div>
        <div class="cat-card" onclick="filterCat('Property')"><div class="cat-icon">🏠</div><div>Property</div></div>
    </div>

    <div class="content">
        <div class="poster-box loan-poster">
            <div class="poster-content">
                <h3>Need Financial Assistance?</h3>
                <button onclick="openModal('loanModal')" style="background:var(--secondary); border:none; padding:12px 30px; border-radius:50px; font-weight:bold; cursor:pointer;">APPLY FOR LOAN</button>
            </div>
        </div>
        <h3>Fresh Recommendations</h3>
        <div class="ads-grid" id="adsGrid">Loading data...</div>
    </div>

    <div id="loanModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('loanModal')">&times;</span>
            <h3>Loan Application</h3>
            <input type="text" id="loanName" placeholder="Full Name *">
            <input type="tel" id="loanPhone" placeholder="Phone Number *">
            <input type="email" id="loanEmail" placeholder="Email ID">
            <input type="text" id="loanAddr" placeholder="Address">
            <input type="text" id="loanOccu" placeholder="Occupation">
            <select id="loanEmp"><option value="">Employment Type</option><option value="Salaried">Salaried</option><option value="Business">Business</option></select>
            <input type="number" id="loanInc" placeholder="Monthly Income">
            <select id="loanType"><option value="Personal Loan">Select Loan Type</option><option value="Home Loan">Home Loan</option><option value="Business Loan">Business Loan</option></select>
            <button onclick="submitLoan()" id="loanSubmitBtn" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT</button>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('detailModal')">&times;</span>
            <img id="detImg" style="width:100%; height:200px; object-fit:cover; border-radius:8px;">
            <h2 id="detPrice" style="text-align:left; color:var(--primary);"></h2>
            <h3 id="detTitle" style="text-align:left;"></h3>
            <p id="detLocation" style="text-align:left; color:#666;"></p>
            <p id="detDesc" style="text-align:left;"></p>
            <hr>
            <button id="callBtn" style="background:var(--secondary); color:black; width:100%; padding:15px; border:none; border-radius:50px; font-weight:bold; margin-bottom:10px;">📞 Call</button>
            <button id="waBtn" style="background:var(--wa-green); color:white; width:100%; padding:15px; border:none; border-radius:50px; font-weight:bold;">💬 WhatsApp</button>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="wa-float">WhatsApp Us</a>
        <button onclick="openModal('uploadModal')" id="sellBtn" style="display:none; background:var(--secondary); padding:12px 20px; border-radius:50px; font-weight:bold; border:none;">➕ Sell Now</button>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhi14LSxcRaSj_fxzZXvLGgP0hO7YAS6V_tZMNdZYApJ-vgKF_oDVdCKW9b9xr64nm/exec";
        const SHEETDB_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";
        let allAds = []; let userEmail = "";

        async function fetchAds() { try { const res = await fetch(SHEETDB_URL); allAds = await res.json(); renderAds(allAds); } catch (e) { console.error("Error"); } }
        
        function renderAds(data) {
            const grid = document.getElementById('adsGrid'); grid.innerHTML = "";
            data.filter(ad => ad.Status !== 'Deleted').reverse().forEach(ad => {
                const card = document.createElement('div'); card.className = 'ad-card'; card.onclick = () => showDetails(ad);
                card.innerHTML = `<img src="${ad.Image || ''}"><div class="ad-info"><div style="font-size:18px; font-weight:900;">Rs ${ad.Price || '0'}</div><div style="font-weight:bold;">${ad.Name || 'Untitled'}</div><div style="font-size:12px; color:#777;">📍 ${ad.Address || 'Kolkata'}</div></div>`;
                grid.appendChild(card);
            });
        }

        function showDetails(ad) {
            document.getElementById('detImg').src = ad.Image;
            document.getElementById('detPrice').innerText = "Rs " + ad.Price;
            document.getElementById('detTitle').innerText = ad.Name;
            document.getElementById('detLocation').innerText = "📍 " + (ad.Address || "Kolkata");
            document.getElementById('detDesc').innerText = ad.Description || "";
            document.getElementById('callBtn').onclick = () => window.location.href = "tel:" + ad.Phone;
            document.getElementById('waBtn').onclick = () => window.open(`https://wa.me/${ad.Phone}?text=Interest in ${ad.Name}`, '_blank');
            openModal('detailModal');
        }

        async function submitLoan() {
            const name = document.getElementById('loanName').value;
            const phone = document.getElementById('loanPhone').value;
            if(!name || !phone) { alert("নাম এবং ফোন অবশ্যই দিন!"); return; }
            const btn = document.getElementById('loanSubmitBtn');
            btn.innerText = "Sending..."; btn.disabled = true;
            const loanData = {
                action: 'loan', name: name, phone: phone,
                email: document.getElementById('loanEmail').value,
                address: document.getElementById('loanAddr').value,
                occupation: document.getElementById('loanOccu').value,
                employment: document.getElementById('loanEmp').value,
                income: document.getElementById('loanInc').value,
                loan_type: document.getElementById('loanType').value
            };
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(loanData) });
                alert("সফলভাবে জমা হয়েছে!"); closeModal('loanModal');
            } catch(e) { alert("Error!"); }
            finally { btn.innerText = "SUBMIT"; btn.disabled = false; }
        }

        async function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email.toLowerCase();
            document.getElementById("loginSection").style.display = "none";
            document.getElementById('userProfile').style.display = "flex";
            document.getElementById('userImg').src = payload.picture;
            document.getElementById('sellBtn').style.display = "block";
            fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'login', name: payload.name, email: userEmail }) });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function filterCat(cat) { renderAds(allAds.filter(ad => ad.Category === cat)); }
        function searchAds() { const q = document.getElementById('searchInput').value.toLowerCase(); renderAds(allAds.filter(ad => ad.Name.toLowerCase().includes(q))); }
        window.onload = fetchAds;
    </script>

    <footer style="background:white; padding:20px; text-align:center; border-top:2px solid #ffce32; margin-top:20px;">
        <h3 style="margin:0;">About Us</h3>
        <p><b>BongoBiz</b>, Kolkata, West Bengal</p>
        <p>Mob: 9733335466 | Email: bongobiz.official@gmail.com</p>
    </footer>
</body>
</html>

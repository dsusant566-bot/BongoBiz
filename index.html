<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Classified Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        
        /* Header & Search */
        header { background: #fff; padding: 10px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); gap: 10px; }
        .logo-img { height: 45px; width: auto; }
        .search-container { flex-grow: 1; max-width: 500px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }

        .nav-right { display: flex; align-items: center; gap: 10px; }
        #userProfile { display: none; align-items: center; gap: 8px; font-size: 12px; font-weight: bold; }
        #userProfile img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }

        /* Hero & Categories */
        .hero { background: linear-gradient(rgba(0,47,52,0.7), rgba(0,47,52,0.7)), url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070'); background-size: cover; padding: 30px 20px; text-align: center; color: white; }
        .categories { display: flex; justify-content: center; gap: 15px; padding: 15px; background: white; overflow-x: auto; white-space: nowrap; }
        .cat-card { text-align: center; cursor: pointer; min-width: 70px; font-size: 11px; font-weight: bold; }
        .cat-icon { font-size: 22px; background: #f0f7ff; padding: 8px; border-radius: 50%; margin-bottom: 5px; display: inline-block; }

        /* Ads Grid */
        .content { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .ad-card { background: white; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; position: relative; transition: 0.3s; }
        .ad-card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .ad-img { width: 100%; height: 150px; object-fit: cover; }
        .ad-info { padding: 10px; }
        .ad-price { font-size: 18px; font-weight: 900; margin: 5px 0; }
        .ad-title { font-size: 14px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.8); color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        /* Modals */
        #uploadModal, #myAdsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        /* Floating buttons */
        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .wa-float { background: var(--wa-green); }
        .sell-float { background: #ffce32; color: #002f34; border: 2px solid white; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img" onerror="this.src='https://via.placeholder.com/120x40?text=BongoBiz'">
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Find Mobiles, Laptops and more...">
            <button onclick="searchAds()">🔍</button>
        </div>

        <div class="nav-right">
            <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
            
            <div id="userProfile">
                <img id="userImg" src="" alt="user">
                <button onclick="showMyAds()" style="background:none; border:none; color:blue; cursor:pointer; font-weight:bold;">My Ads</button>
                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">Logout</button>
            </div>
        </div>
    </header>

    <div class="categories">
        <div class="cat-card" onclick="filterCat('Mobile')"><div class="cat-icon">📱</div><div>Mobile</div></div>
        <div class="cat-card" onclick="filterCat('Laptop')"><div class="cat-icon">💻</div><div>Laptop</div></div>
        <div class="cat-card" onclick="filterCat('Camera')"><div class="cat-icon">📷</div><div>Camera</div></div>
        <div class="cat-card" onclick="filterCat('Electronics')"><div class="cat-icon">❄️</div><div>Electronics</div></div>
        <div class="cat-card" onclick="filterCat('Furniture')"><div class="cat-icon">🪑</div><div>Furniture</div></div>
        <div class="cat-card" onclick="filterCat('Bike')"><div class="cat-icon">🚲</div><div>Bike</div></div>
    </div>

    <div class="content">
        <h3 id="viewTitle">Fresh Recommendations</h3>
        <div class="ads-grid" id="adsGrid">
            <p style="grid-column: 1/-1; text-align: center;">Loading ads...</p>
        </div>
    </div>

    <div id="myAdsModal">
        <div class="modal-content">
            <span onclick="closeMyAds()" style="float:right; cursor:pointer; font-weight:bold;">&times; Close</span>
            <h3>Manage My Ads</h3>
            <div id="myAdsList"></div>
        </div>
    </div>

    <div id="uploadModal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer;">&times;</span>
            <h3>Post Your Ad</h3>
            <input type="text" id="itemName" placeholder="What are you selling?">
            <input type="number" id="itemPrice" placeholder="Price (৳)">
            <select id="itemCat">
                <option value="Mobile">Mobile</option>
                <option value="Laptop">Laptop</option>
                <option value="Camera">Camera</option>
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Bike">Bike</option>
            </select>
            <textarea id="itemDesc" rows="3" placeholder="Description (Optional)"></textarea>
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="processUpload()" id="uploadBtn" style="background:var(--primary); color:white; width:100%; padding:12px; border:none; border-radius:4px; cursor:pointer;">Submit Ad</button>
            <p id="status" style="text-align:center; font-size:12px;"></p>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn wa-float">Contact Us</a>
        <a href="javascript:void(0)" onclick="openModal()" class="f-btn sell-float">➕ Sell Now</a>
    </div>

    <script>
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        const SHEETDB_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";
        let allAds = [];
        let userEmail = "";

        // ১. ডেটা লোড করা
        async function fetchAds() {
            try {
                const res = await fetch(SHEETDB_URL);
                allAds = await res.json();
                renderAds(allAds);
            } catch (e) { console.error("Error fetching data"); }
        }

        // ২. অ্যাড রেন্ডার করা (UI তে দেখানো)
        function renderAds(data) {
            const grid = document.getElementById('adsGrid');
            grid.innerHTML = data.length ? "" : "<p>No ads found.</p>";
            data.reverse().forEach(ad => {
                grid.innerHTML += `
                    <div class="ad-card">
                        <img src="${ad.Image || 'https://via.placeholder.com/150'}" class="ad-img">
                        <div class="ad-info">
                            <div class="ad-price">৳ ${ad.Price}</div>
                            <div class="ad-title">${ad.Name}</div>
                            <div style="font-size:10px; color:#888;">${ad.Category} • ${ad.Date}</div>
                        </div>
                    </div>`;
            });
        }

        // ৩. সার্চ ফিচার
        function searchAds() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAds.filter(ad => 
                ad.Name.toLowerCase().includes(query) || 
                ad.Category.toLowerCase().includes(query)
            );
            document.getElementById('viewTitle').innerText = "Search Results";
            renderAds(filtered);
        }

        // ৪. ক্যাটাগরি ফিল্টার
        function filterCat(cat) {
            const filtered = allAds.filter(ad => ad.Category === cat);
            document.getElementById('viewTitle').innerText = cat + " Category";
            renderAds(filtered);
        }

        // ৫. লগইন ও প্রোফাইল
        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            document.querySelector(".g_id_signin").style.display = "none";
            document.getElementById('userProfile').style.display = "flex";
            document.getElementById('userImg').src = payload.picture;
        }

        // ৬. My Ads সেকশন
        function showMyAds() {
            if(!userEmail) return alert("Login First!");
            const myAds = allAds.filter(ad => ad.Email === userEmail);
            const list = document.getElementById('myAdsList');
            list.innerHTML = myAds.length ? "" : "<p>You haven't posted any ads yet.</p>";
            myAds.forEach(ad => {
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd; padding:10px 0;">
                        <span>${ad.Name} (৳${ad.Price})</span>
                        <button onclick="deletePost('${ad.Name}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Delete</button>
                    </div>`;
            });
            document.getElementById('myAdsModal').style.display = 'flex';
        }

        async function deletePost(name) {
            if(confirm("Are you sure?")) {
                await fetch(`${SHEETDB_URL}/Name/${name}`, { method: 'DELETE' });
                alert("Deleted!");
                location.reload();
            }
        }

        // ৭. আপলোড প্রসেস
        async function processUpload() {
            if(!userEmail) return alert("Please Login with Google first!");
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Select an image");
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true; btn.innerText = "Uploading Image...";

            const fd = new FormData(); fd.append('image', file);
            const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const imgData = await imgRes.json();

            if(imgData.success) {
                btn.innerText = "Saving Ad...";
                await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [{ 
                        Email: userEmail,
                        Name: document.getElementById('itemName').value, 
                        Price: document.getElementById('itemPrice').value, 
                        Category: document.getElementById('itemCat').value,
                        Description: document.getElementById('itemDesc').value,
                        Image: imgData.data.url,
                        Date: new Date().toLocaleDateString()
                    }]})
                });
                location.reload();
            }
        }

        function openModal() { document.getElementById('uploadModal').style.display='flex'; }
        function closeModal() { document.getElementById('uploadModal').style.display='none'; }
        function closeMyAds() { document.getElementById('myAdsModal').style.display='none'; }

        window.onload = fetchAds;
    </script>
</body>
</html>

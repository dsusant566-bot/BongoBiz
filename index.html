<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongoBiz - Marketplace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #002f34; --secondary: #ffce32; --wa-green: #25d366; --bg: #f2f4f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); }
        header { background: #fff; padding: 10px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); gap: 10px; }
        .logo-img { height: 45px; width: auto; }
        .search-container { flex-grow: 1; max-width: 500px; display: flex; border: 2px solid var(--primary); border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        #userProfile { display: none; align-items: center; gap: 8px; font-size: 12px; }
        #userImg { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }
        .hero { background: linear-gradient(rgba(0,47,52,0.7), rgba(0,47,52,0.7)), url('https://images.unsplash.com/photo-1555421689-491a97ff2040?q=80&w=2070'); background-size: cover; padding: 30px 20px; text-align: center; color: white; }
        .categories { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; cursor: pointer; min-width: 75px; font-size: 11px; font-weight: bold; color: inherit; }
        .cat-icon { font-size: 24px; background: #f0f7ff; padding: 10px; border-radius: 50%; margin-bottom: 5px; display: inline-block; }
        .content { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .ad-card { background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .ad-card img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
        .ad-info { padding: 10px; }
        .ad-price { font-size: 18px; font-weight: 900; color: #002f34; }
        
        #uploadModal, #myAdsModal, #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-x { position: absolute; top: 5px; right: 15px; font-size: 45px; color: red; cursor: pointer; font-weight: bold; }
        
        /* ইনপুট বক্স বড় করা */
        .modal-content input, .modal-content textarea {
            width: 100%; padding: 15px !important; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 18px !important; box-sizing: border-box;
        }

        .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 14px; border: 1px solid white; }
        .wa-float { background: var(--wa-green); }
        .sell-float { display: none; background: var(--secondary); color: var(--primary); }
        .my-ad-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg.jpeg" alt="BongoBiz" class="logo-img">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="খুঁজুন...">
            <button onclick="searchAds()">🔍</button>
        </div>
        <div class="nav-right">
            <div id="g_id_onload" data-client_id="599156237689-a76oqncdc044plr147ll9dhkls98ta02.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
            <div id="userProfile">
                <img id="userImg" src="">
                <button onclick="showMyAds()" id="myAdsBtn" style="background:none; border:none; color:blue; cursor:pointer; font-weight:bold;">My Ads</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <h2>ভারতের নিজস্ব ক্লাসিফাইড মার্কেটপ্লেস</h2>
        <p>কেনা-বেচা এবং লোনের আবেদন করুন</p>
    </div>

    <div class="categories">
        <div class="cat-card" onclick="filterCat('Mobile')"><div class="cat-icon">📱</div><div>মোবাইল</div></div>
        <div class="cat-card" onclick="filterCat('Laptop')"><div class="cat-icon">💻</div><div>ল্যাপটপ</div></div>
        <div class="cat-card" onclick="filterCat('Bike')"><div class="cat-icon">🚲</div><div>বাইক</div></div>
        <div class="cat-card" onclick="filterCat('Property')"><div class="cat-icon">🏠</div><div>প্রপার্টি</div></div>
    </div>

    <div class="content">
        <h3>নতুন বিজ্ঞাপন</h3>
        <div class="ads-grid" id="adsGrid">লোড হচ্ছে...</div>
    </div>

    <div id="detailModal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('detailModal')">&times;</span>
            <img id="detImg" style="width:100%; height:200px; object-fit:cover; border-radius:8px;">
            <h2 id="detPrice" style="color:var(--primary); margin:15px 0;"></h2>
            <h3 id="detTitle"></h3>
            <p id="detDesc"></p>
            <hr>
            <a id="detCall" href="" class="f-btn" style="background:var(--secondary); color:black; justify-content:center; margin-bottom:10px;">📞 কল করুন</a>
            <a id="detWA" href="" target="_blank" class="f-btn wa-float" style="justify-content:center;">💬 হোয়াটসঅ্যাপ</a>
        </div>
    </div>

    <div id="uploadModal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('uploadModal')">&times;</span>
            <h3 id="postTitle">বিজ্ঞাপন দিন</h3>
            <input type="text" id="itemName" placeholder="পণ্যের নাম">
            <input type="number" id="itemPrice" placeholder="দাম">
            <input type="tel" id="itemPhone" placeholder="ফোন নম্বর">
            <textarea id="itemDesc" placeholder="বিস্তারিত বিবরণ"></textarea>
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="processUpload()" id="uploadBtn" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">সাবমিট করুন</button>
        </div>
    </div>

    <div id="myAdsModal">
        <div class="modal-content">
            <span class="close-x" onclick="closeMyAds()">&times;</span>
            <h3>আমার বিজ্ঞাপন</h3>
            <div id="myAdsList"></div>
        </div>
    </div>

    <div class="float-wrap">
        <a href="https://wa.me/917585999923" class="f-btn wa-float">যোগাযোগ করুন</a>
        <a href="javascript:void(0)" onclick="openModal('uploadModal')" class="f-btn sell-float" id="sellBtn">➕ বিক্রি করুন</a>
    </div>

    <script>
        const IMGBB_KEY = "7c835d074933c0fbda62c071556faba6";
        const SHEETDB_URL = "https://sheetdb.io/api/v1/cioz6pe7gyldq";
        let allAds = []; let userEmail = "";
        let editingAdTitle = null;

        async function fetchAds() {
            try {
                const res = await fetch(SHEETDB_URL);
                allAds = await res.json();
                renderAds(allAds);
            } catch (e) { document.getElementById('adsGrid').innerHTML = "লোড হচ্ছে না..."; }
        }

        function renderAds(data) {
            const grid = document.getElementById('adsGrid'); grid.innerHTML = "";
            [...data].reverse().forEach(ad => {
                const card = document.createElement('div');
                card.className = 'ad-card';
                card.onclick = () => showDetails(ad);
                card.innerHTML = `<img src="${ad.Image || ''}"><div class="ad-info"><div class="ad-price">Rs ${ad.Price || '0'}</div><div class="ad-title">${ad.Title || 'No Title'}</div></div>`;
                grid.appendChild(card);
            });
        }

        function showDetails(ad) {
            document.getElementById('detImg').src = ad.Image || "";
            document.getElementById('detPrice').innerText = "Rs " + (ad.Price || "0");
            document.getElementById('detTitle').innerText = ad.Title || "";
            document.getElementById('detDesc').innerText = ad.Description || "";
            document.getElementById('detCall').href = "tel:" + ad.Phone;
            document.getElementById('detWA').href = `https://wa.me/${ad.Phone}?text=Interest in ${ad.Title}`;
            openModal('detailModal');
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email.toLowerCase();
            document.querySelector(".g_id_signin").style.display = "none";
            document.getElementById('userProfile').style.display = "flex";
            document.getElementById('userImg').src = payload.picture;
            document.getElementById('sellBtn').style.display = "flex";
        }

        async function processUpload() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const phone = document.getElementById('itemPhone').value;
            const desc = document.getElementById('itemDesc').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true; btn.innerText = "কাজ চলছে...";

            let imageUrl = "";
            if(file) {
                const fd = new FormData(); fd.append('image', file);
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                const imgData = await imgRes.json();
                if(imgData.success) imageUrl = imgData.data.url;
            } else if(editingAdTitle) {
                const oldAd = allAds.find(a => a.Title === editingAdTitle);
                imageUrl = oldAd.Image;
            }

            const adData = { Title: name, Price: price, Phone: phone, Description: desc, Image: imageUrl, Email: userEmail };

            if(editingAdTitle) {
                await fetch(`${SHEETDB_URL}/Title/${editingAdTitle}`, { method: 'DELETE' });
            }

            await fetch(SHEETDB_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [adData] })
            });

            alert("সফল হয়েছে!");
            location.reload();
        }

        function showMyAds() {
            const myAds = allAds.filter(ad => (ad.Email || "").toLowerCase() === userEmail);
            const list = document.getElementById('myAdsList');
            list.innerHTML = myAds.length ? "" : "কোনো অ্যাড নেই।";
            myAds.forEach(ad => {
                list.innerHTML += `
                    <div class="my-ad-item">
                        <span>${ad.Title} (Rs ${ad.Price})</span>
                        <div>
                            <button onclick="editAd('${ad.Title}')" style="background:orange; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Edit</button>
                            <button onclick="deleteAd('${ad.Title}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Delete</button>
                        </div>
                    </div>`;
            });
            openModal('myAdsModal');
        }

        function editAd(title) {
            const ad = allAds.find(a => a.Title === title);
            if(ad) {
                editingAdTitle = title;
                document.getElementById('itemName').value = ad.Title;
                document.getElementById('itemPrice').value = ad.Price;
                document.getElementById('itemPhone').value = ad.Phone;
                document.getElementById('itemDesc').value = ad.Description;
                closeMyAds(); openModal('uploadModal');
                document.getElementById('uploadBtn').innerText = "আপডেট করুন";
            }
        }

        async function deleteAd(title) {
            if(confirm("মুছে ফেলতে চান?")) {
                await fetch(`${SHEETDB_URL}/Title/${title}`, { method: 'DELETE' });
                location.reload();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'uploadModal') { editingAdTitle = null; document.getElementById('uploadBtn').innerText = "সাবমিট করুন"; }
        }
        function closeMyAds() { document.getElementById('myAdsModal').style.display='none'; }
        window.onload = fetchAds;
    </script>
</body>
</html>
